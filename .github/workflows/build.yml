name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  make:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact: mate-x-windows-x64
          - os: macos-15
            arch: arm64
            artifact: mate-x-macos-arm64
          - os: macos-15
            arch: x64
            artifact: mate-x-macos-x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install native libsql optional dependency
        shell: bash
        run: |
          case "${{ runner.os }}-${{ matrix.arch }}" in
            macOS-arm64) bun add --optional --exact @libsql/darwin-arm64@0.5.29 ;;
            macOS-x64) bun add --optional --exact @libsql/darwin-x64@0.5.29 ;;
            Windows-x64) bun add --optional --exact @libsql/win32-x64-msvc@0.5.29 ;;
          esac

      - name: Show toolchain
        if: startsWith(matrix.os, 'macos')
        run: |
          xcodebuild -version
          xcrun --find actool

      - name: Make
        run: bun run make -- --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/make/**/*
          if-no-files-found: error

  release:
    needs: make
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: release-artifacts/**/*
